services:
  voixla:
    build:
      context: .
      args:
        # Hosted at ryandeering.ie/voixla behind the nginx reverse proxy.
        BASE_PATH: "/voixla"
    image: voixla
    container_name: voixla
    ports:
      - "5005:5005"
    # Ephemeral cache on tmpfs; in-app janitor also purges entries older than ~30 min.
    tmpfs:
      - /app/cache:size=600m,mode=1777
    restart: unless-stopped
