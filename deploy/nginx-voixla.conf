# Voixla on-demand reverse-proxy locations.
#
# Paste these into the `server { listen 443 ssl; server_name ryandeering.ie; }`
# block of /etc/nginx/sites-enabled/ryandeering.ie, BEFORE the static-asset
# regex location (the `^~` prefix wins over regex matches, mirroring /quake/).
#
# The image is built with BASE_PATH=/voixla, so the /voixla prefix is preserved
# on the way to the backend (note: no trailing slash on proxy_pass).

# Voixla (text-to-speech): proxy the SPA + API, start the container on demand.
location ^~ /voixla/ {
    proxy_pass http://127.0.0.1:5005;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;

    # Allow long-lived WAV streaming / range requests.
    proxy_read_timeout 86400;

    # Dedicated log; voixla-idle-watcher.sh uses its mtime to detect activity.
    access_log /var/log/nginx/voixla.access.log;

    # When the container is down (502/504), show the splash, which wakes it.
    proxy_intercept_errors on;
    error_page 502 504 = @voixla_starting;
}

# Wake endpoint: starts the container on demand (voixla-wake-server.py).
location = /voixla/wake {
    proxy_pass http://127.0.0.1:8083/;
    proxy_connect_timeout 2s;
    proxy_read_timeout 2s;
}

# Splash page shown while the container is starting.
location @voixla_starting {
    root /var/www/html;
    rewrite ^ /voixla-starting.html break;
}

location = /voixla {
    return 301 /voixla/;
}
