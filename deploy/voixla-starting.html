<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Starting Voixla…</title>
    <meta http-equiv="refresh" content="3">
    <style>
        :root {
            --bg: #202124;
            --surface: #292a2d;
            --text: #e8eaed;
            --muted: #9aa0a6;
            --accent: #8ab4f8;
        }
        * { box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            text-align: center;
            padding: 2.5rem 3rem;
        }
        h1 {
            font-size: 1.9rem;
            font-weight: 600;
            margin: 0 0 0.5rem;
            letter-spacing: -0.01em;
        }
        h1 .accent { color: var(--accent); }
        p {
            color: var(--muted);
            margin: 0.25rem 0 0;
            font-size: 0.95rem;
        }
        .bars {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            height: 56px;
            margin: 2rem 0 1.75rem;
        }
        .bars span {
            width: 6px;
            border-radius: 3px;
            background: var(--accent);
            animation: pulse 1.1s ease-in-out infinite;
        }
        .bars span:nth-child(1) { animation-delay: 0s; }
        .bars span:nth-child(2) { animation-delay: 0.15s; }
        .bars span:nth-child(3) { animation-delay: 0.3s; }
        .bars span:nth-child(4) { animation-delay: 0.45s; }
        .bars span:nth-child(5) { animation-delay: 0.6s; }
        .bars span:nth-child(6) { animation-delay: 0.75s; }
        .bars span:nth-child(7) { animation-delay: 0.9s; }
        @keyframes pulse {
            0%, 100% { height: 12px; opacity: 0.5; }
            50%      { height: 48px; opacity: 1; }
        }
        @media (prefers-reduced-motion: reduce) {
            .bars span { animation: none; height: 30px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="bars" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
        <h1>Waking <span class="accent">Voixla</span>…</h1>
        <p>Spinning up the text-to-speech engine.</p>
        <p>This page refreshes automatically, hold tight.</p>
    </div>
    <script>
        // Ask the wake server to start the container (no-op if already running).
        fetch('/voixla/wake').catch(function () {});
    </script>
</body>
</html>
